<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motor de Búsqueda - Ontología de Inteligencia Artificial</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>Motor de Búsqueda Ontológico</h1>
            <p class="subtitle" id="subtitle">Inteligencia Artificial — Ontología Local + DBpedia Multilingüe</p>
        </header>

        <div class="stats" id="stats">
            <!-- Las estadísticas se cargarán aquí -->
        </div>

        <div class="search-container">
            <div class="search-header">
                <div>
                    <h2 id="searchTitle">Buscar en la Ontología</h2>
                    <p class="lang-hint" id="langHint">Idioma de búsqueda: 🇪🇸 Español</p>
                </div>
                <div class="language-selector">
                    <button class="lang-btn active" data-lang="es" onclick="changeLang('es')" title="Buscar en español">🇪🇸 ES</button>
                    <button class="lang-btn" data-lang="en" onclick="changeLang('en')" title="Search in English">🇺🇸 EN</button>
                    <button class="lang-btn" data-lang="de" onclick="changeLang('de')" title="Suche auf Deutsch">🇩🇪 DE</button>
                    <button class="lang-btn" data-lang="fr" onclick="changeLang('fr')" title="Rechercher en français">🇫🇷 FR</button>
                    <button class="lang-btn" data-lang="ja" onclick="changeLang('ja')" title="日本語で検索">🇯🇵 JA</button>
                </div>
            </div>

            <div class="search-options">
                <label class="dbpedia-all-toggle">
                    <input type="checkbox" id="dbpediaAllLangs" onchange="onDbpediaAllChange()" />
                    <span id="dbpediaAllLabel">Buscar DBpedia en todos los idiomas</span>
                </label>
            </div>

            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Ej: machine learning, red neuronal, NLP..." />
                <button id="searchBtn" onclick="performSearch()">Buscar</button>
            </div>

            <div class="filters">
                <button class="filter-btn active" data-filter="all" onclick="setFilter('all')" id="filterAll">Todos</button>
                <button class="filter-btn" data-filter="class" onclick="setFilter('class')" id="filterClass">Clases</button>
                <button class="filter-btn" data-filter="property" onclick="setFilter('property')" id="filterProperty">Propiedades</button>
                <button class="filter-btn" data-filter="individual" onclick="setFilter('individual')" id="filterIndividual">Individuos</button>
            </div>
        </div>

        <div class="results-container" id="resultsContainer" style="display: none;">
            <div class="results-header">
                <h3 class="results-count" id="resultsCount"></h3>
                <div class="source-stats" id="sourceStats"></div>
            </div>
            <div id="results"></div>
        </div>
    </div>

    <div class="modal" id="detailModal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <div id="detailContent"></div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
